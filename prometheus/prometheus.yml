global:
  scrape_interval: 15s
  evaluation_interval: 15s
scrape_configs:
  - job_name: 'api_stats'
    static_configs:
      - targets: ['api:8000']  

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8085']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']