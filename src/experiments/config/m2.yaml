# Configuration M2 — stacking multimodal sur embeddings frozen

datamodule:
  mode: m2_embeddings
  text_model: dangvantuan/sentence-camembert-base
  image_model: resnet18
  cache_version: 1
  batch_size: 64
  num_workers: 4
  val_size: 0.15
  test_size: 0.15
  random_state: 42

model:
  n_classes: 27
  n_folds: 5
  n_trials: 30
  random_state: 42
  n_jobs_optuna: 4

mlflow:
  experiment_name: M2_stacking
  run_name: M2_camembert_resnet18_lgbm_v1
  tracking_uri: http://mlflow:5000   # override possible via --mlflow-tracking-uri
  tags:
    model_family: M2
    base_text: camembert
    base_image: resnet18
    architecture: stacking_logreg_lgbm