version: "3.8"

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - rakuten

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow
    command: ["mlflow", "server",
              "--backend-store-uri=sqlite:///mlflow.db",
              "--default-artifact-root=/mlflow/mlruns",
              "--host=0.0.0.0",
              "--port=5000"]
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:///mlflow.db
      - MLFLOW_ARTIFACT_ROOT=/mlflow/mlruns
    volumes:
      - ./mlruns:/mlflow/mlruns
      - ./mlflow.db:/mlflow/mlflow.db
    networks:
      - rakuten

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./.git:/app/.git
      - ./mlruns:/mlflow/mlruns
      - ./mlflow.db:/mlflow/mlflow.db
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - PYTHONUNBUFFERED=1
    depends_on:
      - mongodb
      - mlflow
    networks:
      - rakuten

volumes:
  mongo_data:
    external: true
    name: mar25_cmlops_rakuten_mongo_data

networks:
  rakuten:
